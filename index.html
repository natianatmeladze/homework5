<!doctype html>
<html lang="en">
  <head>
    <title>Viatours Page</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <section class="header-section">
        <nav class="header-nav">
        <img class="logo" src="./images/logo.png" alt="viatours" />
        <ul class="header-list">
          <li class="header-list-item">
            <a class="nav-item" href="index.html">Destinations</a>
          </li>
          <li class="header-list-item">
            <a class="nav-item" href="index.html">Activities</a>
          </li>
          <li class="header-list-item">
            <a class="nav-item" href="index.html">USD</a>
          </li>
          <li class="header-list-item">
            <a class="nav-item" href="index.html">Sign up</a>
          </li>
        </ul>
        <button class="log-in-button">Log in</button>
        </nav>
      </section>
    </header>
    <main>
      <section class="hero-section">
        <div class="text-wrapper">
          <h1 class="hero-header">Find Your Next Destination</h1>
          <p class="hero-par">From local escapes to far-flung adventures, find what makes you happy anytime, anywhere</p>
          <button class="hero-button">Start Exploring</button>
        </div>
      </section>
    </main>
    <section class="destinations">
        <h2 class="destinations-header">Trending destinations</h2>
        <p class="destinations-par">See all</p>
        <div class="card-row1">
          <div class="img-wrapper">
          <img class="city-img" src="./images/paris.jpg" alt="paris">
          <p class="city paris">Paris</p>
          </div>
          <div  class="img-wrapper">
          <img class="city-img" src="./images/singapore.jpg" alt="singapore">
          <p class="city singapore">Singapore</p>
          </div>
          <div  class="img-wrapper">
          <img class="city-img" src="./images/roma.jpg" alt="roma">
          <p class="city roma">Roma</p>
          </div>
          <div  class="img-wrapper">
          <img class="city-img" src="./images/bangkok.jpg" alt="bangkok">
          <p class="city bangkok">Bangkok</p>
          </div>
        </div>
        <div class="card-row2">
          <div  class="img-wrapper">
          <img class="city-img" src="./images/bali.jpg" alt="bali">
          <p class="city bali">Bali</p>
          </div>
          <div  class="img-wrapper">
          <img class="city-img" src="./images/phuket.jpg" alt="phuket">
          <p class="city phuket">Phuket</p>
          </div>
          <div  class="img-wrapper">
          <img class="city-img" src="./images/tokyo.jpg" alt="tokyo">
          <p class="city tokyo">Tokyo</p>
          </div>
          <div  class="img-wrapper">
          <img class="city-img" src="./images/cappadocia.jpg" alt="cappadocia">
          <p class="city cappadocia">Cappadocia</p>
          </div>
        </div>
    </section>
    <img class="scroll-up" src="./images/arrow-up-svgrepo-com (1).svg" alt="scroll up">
  </body>
</html>
